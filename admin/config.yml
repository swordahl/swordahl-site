backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "lorebook"
    label: "Lore Book"
    delete: false
    editor:
      preview: false
    files:
      - file: "content/lore/book.json"
        label: "Book Pages"
        name: "book"
        format: "json"
        fields:
          - label: "Pages"
            name: "pages"
            widget: "list"
            summary: "Spread {{fields.left | truncate(40)}}"
            allow_add: true
            fields:
              - { label: "Left Page", name: "left", widget: "text" }
              - { label: "Right Page", name: "right", widget: "text" }
